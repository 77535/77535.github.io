<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>高中化学·原电池互动教学实验室 | 动态模拟与动手组装</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* 避免拖动干扰，不影响文字选择 */
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, '微软雅黑', sans-serif;
            background: linear-gradient(145deg, #f0f7ff 0%, #e9f0fa 100%);
            margin: 0;
            padding: 20px;
            color: #1a2c3e;
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e6f3f, #2b7a4b, #0f4c2c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
            letter-spacing: -0.5px;
        }

        .sub {
            text-align: center;
            color: #2c5a3b;
            margin-bottom: 30px;
            font-weight: 500;
            border-bottom: 2px solid #bcd0aa;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 6px;
        }

        /* 两列布局 */
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 40px;
        }

        /* 教学演示区卡片 */
        .demo-card {
            flex: 1.2;
            min-width: 550px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            padding: 20px;
            transition: all 0.2s;
            border: 1px solid rgba(80,120,70,0.3);
        }

        .assembly-card {
            flex: 0.9;
            min-width: 450px;
            background: rgba(255,255,248,0.9);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            padding: 20px;
            border: 1px solid #d4e2c6;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 6px solid #2e7d32;
            padding-left: 15px;
            color: #1f4f2b;
        }

        /* canvas 区域 */
        .canvas-container {
            background: #fefef7;
            border-radius: 28px;
            padding: 12px;
            box-shadow: inset 0 1px 4px #0001, 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #fffcf0;
            border-radius: 24px;
            cursor: pointer;
        }

        /* 控制栏 */
        .control-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 18px 0 12px;
            align-items: center;
            justify-content: space-between;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button, .select-style {
            background: #f5f7fa;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            font-family: inherit;
            border: 1px solid #cbdcd0;
        }

        button:hover {
            background: #e0f0e4;
            transform: translateY(-2px);
            border-color: #5f9e6e;
        }

        .primary-btn {
            background: #2b7a4b;
            color: white;
            border: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .primary-btn:hover {
            background: #1e5e3a;
            transform: scale(0.98);
        }

        select {
            background: white;
            padding: 8px 14px;
            border-radius: 32px;
            border: 1px solid #b9cfb0;
            font-weight: 500;
            cursor: pointer;
        }

        .step-explanation {
            background: #eaf4e3;
            border-radius: 28px;
            padding: 12px 18px;
            margin-top: 15px;
            font-size: 0.9rem;
            border-left: 5px solid #388e3c;
        }

        .param-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            background: #f0f5ea;
            padding: 8px 14px;
            border-radius: 48px;
            margin-top: 8px;
        }

        .voltage-value {
            font-family: monospace;
            font-weight: bold;
            background: #1a2c2f;
            color: #e6ffdb;
            padding: 4px 12px;
            border-radius: 36px;
            font-size: 1rem;
        }

        hr {
            margin: 18px 0;
            border-color: #cfe3cf;
        }

        .assembly-area {
            margin-top: 15px;
        }

        .assembly-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #fafef5;
            padding: 15px;
            border-radius: 24px;
        }

        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .feedback {
            background: #2d3e2b20;
            border-radius: 28px;
            padding: 10px 15px;
            margin-top: 15px;
            font-weight: 500;
        }

        @media (max-width: 1050px) {
            .dashboard {
                flex-direction: column;
            }
            .demo-card, .assembly-card {
                min-width: auto;
            }
        }
        .badge {
            background: #f9c74f;
            border-radius: 30px;
            padding: 2px 12px;
            font-size: 0.7rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ 原电池互动教学实验室 ⚡</h1>
    <div style="text-align: center"><span class="sub">电子流动 · 离子迁移 · 自主探究</span></div>

    <div class="dashboard">
        <!-- 左侧：教学演示模块 (铜锌原电池/水果电池 + 条件改变 + 分步讲解) -->
        <div class="demo-card">
            <div class="card-title">🧪 动态实验展示区 <span class="badge">经典案例+交互调节</span></div>
            <div class="canvas-container">
                <canvas id="demoCanvas" width="700" height="380" style="width:100%; height:auto; max-width:700px; aspect-ratio:700/380"></canvas>
            </div>
            
            <!-- 案例切换 + 条件改变控件 -->
            <div class="param-row">
                <span>🔁 电池案例：</span>
                <select id="caseSelect">
                    <option value="cu_zn">铜锌原电池 (稀硫酸)</option>
                    <option value="fruit">水果电池 (柠檬/铜锌)</option>
                </select>
                <span id="conditionLabel">⚙️ 调节参数：</span>
                <select id="conditionSelect">
                    <option value="normal">标准状态</option>
                    <option value="highConc">高浓度电解质 → 电流增强</option>
                    <option value="lowConc">低浓度电解质 → 电流减弱</option>
                </select>
                <span id="extraOption"></span>
            </div>

            <!-- 动画控制栏 -->
            <div class="control-bar">
                <div class="btn-group">
                    <button id="playPauseDemoBtn">⏸️ 暂停</button>
                    <button id="resetAnimDemoBtn">🔄 重置动画</button>
                </div>
                <div class="btn-group">
                    <button id="stepPrevBtn">◀ 上一步</button>
                    <button id="stepNextBtn">下一步 ▶</button>
                </div>
                <div><span class="voltage-value" id="demoVoltageDisplay">⚡ 电压: 1.10 V</span></div>
            </div>
            
            <!-- 分步讲解区域 -->
            <div class="step-explanation" id="stepTextDemo">
                <strong>📖 分步讲解 (共4步)</strong><br>
                <span id="stepDetail">步骤1: 负极Zn失去电子，发生氧化反应 Zn → Zn²⁺ + 2e⁻</span>
            </div>
            <div style="font-size: 0.75rem; color: #4a6741; margin-top: 8px;">💡 提示: 点击“下一步”高亮对应区域，动画自动暂停观察微观过程</div>
        </div>

        <!-- 右侧：动手组装区  (学生自主组合) -->
        <div class="assembly-card">
            <div class="card-title">🛠️ 动手组装实验室 <span class="badge">自由搭配 · 验证原理</span></div>
            <div class="canvas-container">
                <canvas id="assemblyCanvas" width="700" height="380" style="width:100%; height:auto; max-width:700px; aspect-ratio:700/380"></canvas>
            </div>
            <div class="assembly-area">
                <div class="assembly-options">
                    <div class="option-row">
                        <span>🔴 负极材料 (活泼金属):</span>
                        <select id="anodeSelect">
                            <option value="Zn">锌 (Zn)</option>
                            <option value="Mg">镁 (Mg)</option>
                            <option value="Al">铝 (Al)</option>
                        </select>
                    </div>
                    <div class="option-row">
                        <span>🟢 正极材料 (导体):</span>
                        <select id="cathodeSelect">
                            <option value="Cu">铜 (Cu)</option>
                            <option value="C">石墨 (C)</option>
                            <option value="Ag">银 (Ag)</option>
                        </select>
                    </div>
                    <div class="option-row">
                        <span>🧪 电解质溶液:</span>
                        <select id="electrolyteSelect">
                            <option value="H2SO4">稀硫酸 (H₂SO₄)</option>
                            <option value="lemon">柠檬汁 (酸性)</option>
                            <option value="NaCl">食盐水 (中性)</option>
                        </select>
                    </div>
                    <div class="btn-group" style="justify-content: center;">
                        <button id="assembleBtn" class="primary-btn">🔧 组装并运行电池</button>
                        <button id="pauseAssemblyBtn">⏸️ 暂停/播放</button>
                    </div>
                </div>
                <div class="feedback" id="assemblyFeedback">
                    💡 点击「组装并运行」—— 观察电子流动和离子迁移，验证原电池构成条件！
                </div>
                <div id="assemblyVoltage" class="voltage-value" style="background:#1e3a2f; text-align:center;">电压: -- V</div>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ----------------------------- 演示模块 (Demo) -----------------------------
        const demoCanvas = document.getElementById('demoCanvas');
        const ctxDemo = demoCanvas.getContext('2d');
        let demoAnimId = null;
        let demoPlaying = true;
        let demoStep = 0;          // 分步讲解步骤 0~3
        let demoHighlight = null;   // 高亮区域 'anode','cathode','solution','wire'
        
        // 当前演示参数
        let demoType = "cu_zn";     // 'cu_zn' or 'fruit'
        let demoCondition = "normal"; // 'normal','highConc','lowConc'
        let demoVoltage = 1.10;
        let electronSpeedFactor = 1.0;
        
        // 动画粒子数据 (演示模块)
        let demoElectrons = [];      // 电子位置 0~1 表示从负极到正极的进度
        let demoIons = [];           // 离子粒子 {type:'cation'/'anion', x, y, target}
        
        // 固定尺寸参数 (相对坐标)
        const canvasW = 700, canvasH = 380;
        demoCanvas.width = canvasW;
        demoCanvas.height = canvasH;
        
        // 电极位置: 左负右正
        const anodeX = 150, cathodeX = 550, electrodeY = 200;
        const wireStart = {x: anodeX+30, y: electrodeY-45}; // 导线起点
        const wireEnd = {x: cathodeX-30, y: electrodeY-45};
        
        // 初始化粒子
        function initDemoParticles() {
            demoElectrons = [];
            for(let i=0;i<6;i++) {
                demoElectrons.push({ progress: Math.random() }); // 随机位置
            }
            demoIons = [];
            for(let i=0;i<12;i++) {
                let isCation = Math.random() > 0.5;
                demoIons.push({
                    type: isCation ? 'cation' : 'anion',
                    x: anodeX + 30 + Math.random() * (cathodeX - anodeX - 60),
                    y: electrodeY + 30 + Math.random() * 80,
                    vx: (Math.random() - 0.5)*0.4,
                    vy: (Math.random() - 0.5)*0.4
                });
            }
        }
        
        // 根据条件更新电压/速度因子
        function updateDemoParamsByCondition() {
            let baseV = (demoType === 'cu_zn') ? 1.10 : 0.95;
            if(demoType === 'fruit') baseV = 0.95;
            if(demoCondition === 'highConc') { baseV *= 1.25; electronSpeedFactor = 1.5; }
            else if(demoCondition === 'lowConc') { baseV *= 0.65; electronSpeedFactor = 0.6; }
            else { electronSpeedFactor = 1.0; }
            demoVoltage = Math.round(baseV * 100)/100;
            document.getElementById('demoVoltageDisplay').innerText = `⚡ 电压: ${demoVoltage} V`;
        }
        
        // 切换案例特殊处理 (电极材料名称)
        function getDemoElectrodes() {
            if(demoType === 'cu_zn') return { anode: "Zn", cathode: "Cu", electrolyte: "稀H₂SO₄" };
            else return { anode: "Zn", cathode: "Cu", electrolyte: "柠檬酸 (水果)" };
        }
        
        // 绘制演示模块 (含高亮)
        function drawDemoWithHighlight() {
            const electrodes = getDemoElectrodes();
            drawBattery(ctxDemo, canvasW, canvasH, electrodes.anode, electrodes.cathode, electrodes.electrolyte, demoVoltage, demoHighlight);
            // 额外绘制动态粒子 (电子流和离子)
            drawParticles(ctxDemo, demoElectrons, demoIons, anodeX, cathodeX, electrodeY);
        }
        
        // 通用电池绘图 (静态元素)
        function drawBattery(ctx, w, h, anodeName, cathodeName, electrolyteName, voltage, highlightZone) {
            ctx.clearRect(0,0,w,h);
            // 背景
            ctx.fillStyle = "#fffcf0";
            ctx.fillRect(0,0,w,h);
            // 烧杯
            ctx.beginPath();
            ctx.moveTo(80, 120);
            ctx.lineTo(620, 120);
            ctx.lineTo(600, 330);
            ctx.lineTo(100, 330);
            ctx.closePath();
            ctx.fillStyle = "#e8f0e3c0";
            ctx.fill();
            ctx.strokeStyle = "#6b8c5c";
            ctx.lineWidth = 2;
            ctx.stroke();
            // 电解质文字
            ctx.font = "500 14px 'Segoe UI'";
            ctx.fillStyle = "#2b4f2e";
            ctx.fillText(`电解质: ${electrolyteName}`, w/2-70, 100);
            
            // 电极 + 标注
            // 负极(左)
            ctx.fillStyle = "#b87333";
            ctx.shadowBlur=0;
            ctx.fillRect(anodeX-20, electrodeY-50, 40, 100);
            ctx.fillStyle = "#cd7f42";
            ctx.fillRect(anodeX-18, electrodeY-48, 36, 96);
            ctx.fillStyle = "#4a2a1a";
            ctx.font = "bold 18px 'Segoe UI'";
            ctx.fillText(anodeName, anodeX-8, electrodeY-65);
            ctx.fillStyle = "#5a3e2a";
            ctx.font = "14px sans-serif";
            ctx.fillText("负极", anodeX-8, electrodeY+65);
            // 正极(右)
            ctx.fillStyle = "#b87333";
            ctx.fillRect(cathodeX-20, electrodeY-50, 40, 100);
            ctx.fillStyle = "#e8a75c";
            ctx.fillRect(cathodeX-18, electrodeY-48, 36, 96);
            ctx.fillStyle = "#4a2a1a";
            ctx.font = "bold 18px 'Segoe UI'";
            ctx.fillText(cathodeName, cathodeX-8, electrodeY-65);
            ctx.fillStyle = "#5a3e2a";
            ctx.fillText("正极", cathodeX-8, electrodeY+65);
            
            // 导线 (弧线)
            ctx.beginPath();
            ctx.moveTo(anodeX+22, electrodeY-35);
            ctx.quadraticCurveTo(anodeX+150, electrodeY-80, cathodeX-22, electrodeY-35);
            ctx.strokeStyle = "#5a5a5a";
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(anodeX+22, electrodeY-35);
            ctx.quadraticCurveTo(anodeX+150, electrodeY-80, cathodeX-22, electrodeY-35);
            ctx.strokeStyle = "#ffd966";
            ctx.lineWidth = 2.5;
            ctx.stroke();
            
            // 灯泡示意
            ctx.beginPath();
            ctx.arc(anodeX+180, electrodeY-68, 18, 0, Math.PI*2);
            ctx.fillStyle = "#fff3b0";
            ctx.fill();
            ctx.fillStyle = "#c97e00";
            ctx.font = "20px sans-serif";
            ctx.fillText("💡", anodeX+171, electrodeY-62);
            
            // 高亮区域
            if(highlightZone === 'anode') {
                ctx.globalAlpha = 0.35;
                ctx.fillStyle = "#ffec80";
                ctx.fillRect(anodeX-28, electrodeY-60, 56, 125);
                ctx.globalAlpha = 1;
            } else if(highlightZone === 'cathode') {
                ctx.globalAlpha = 0.35;
                ctx.fillStyle = "#ffec80";
                ctx.fillRect(cathodeX-28, electrodeY-60, 56, 125);
                ctx.globalAlpha = 1;
            } else if(highlightZone === 'wire') {
                ctx.beginPath();
                ctx.moveTo(anodeX+22, electrodeY-35);
                ctx.quadraticCurveTo(anodeX+150, electrodeY-80, cathodeX-22, electrodeY-35);
                ctx.lineWidth = 14;
                ctx.strokeStyle = "#ffd966cc";
                ctx.stroke();
            } else if(highlightZone === 'solution') {
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = "#b5e0a0";
                ctx.fillRect(100, 150, 500, 160);
                ctx.globalAlpha = 1;
            }
            
            // 电压表指示
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = "#1f5438";
            ctx.fillText(`电压: ${voltage} V`, w-120, 50);
        }
        
        // 绘制粒子 (电子流动 + 离子迁移)
        function drawParticles(ctx, electrons, ions, anodeXPos, cathodeXPos, elecY) {
            // 电子沿导线移动: 路径插值
            for(let e of electrons) {
                let t = e.progress;
                let startX = anodeXPos+22, startY = elecY-35;
                let endX = cathodeXPos-22, endY = elecY-35;
                let cx = anodeXPos+150, cy = elecY-80;
                let x = (1-t)*(1-t)*startX + 2*(1-t)*t*cx + t*t*endX;
                let y = (1-t)*(1-t)*startY + 2*(1-t)*t*cy + t*t*endY;
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, Math.PI*2);
                ctx.fillStyle = "#ffc107";
                ctx.shadowBlur = 8;
                ctx.fill();
                ctx.fillStyle = "#f5a623";
                ctx.arc(x, y, 3, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            // 离子迁移 (简单动画)
            for(let ion of ions) {
                ctx.beginPath();
                if(ion.type === 'cation') {
                    ctx.fillStyle = "#4285f4";
                    ctx.arc(ion.x, ion.y, 5, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.fillStyle = "white";
                    ctx.font = "bold 10px sans-serif";
                    ctx.fillText("+", ion.x-2, ion.y+3);
                } else {
                    ctx.fillStyle = "#ea4335";
                    ctx.arc(ion.x, ion.y, 5, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.fillStyle = "white";
                    ctx.fillText("-", ion.x-2, ion.y+3);
                }
            }
        }
        
        // 动画更新 (演示)
        function updateDemoAnimation() {
            if(!demoPlaying) return;
            // 更新电子progress
            let speed = 0.008 * electronSpeedFactor;
            for(let e of demoElectrons) {
                e.progress += speed;
                if(e.progress >= 1) e.progress = 0;
            }
            // 更新离子向电极漂移 (阳离子向正极，阴离子向负极)
            for(let ion of demoIons) {
                if(ion.type === 'cation') {
                    let dx = (cathodeX - 10) - ion.x;
                    let dy = (electrodeY) - ion.y;
                    let len = Math.hypot(dx,dy);
                    if(len>3) { ion.x += dx/len * 1.2; ion.y += dy/len * 0.8; }
                } else {
                    let dx = (anodeX + 10) - ion.x;
                    let dy = (electrodeY) - ion.y;
                    let len = Math.hypot(dx,dy);
                    if(len>3) { ion.x += dx/len * 1.0; ion.y += dy/len * 0.6; }
                }
                // 边界重置
                if(ion.x<anodeX-40 || ion.x>cathodeX+40 || ion.y<electrodeY-60 || ion.y>electrodeY+100) {
                    ion.x = anodeX + 30 + Math.random() * (cathodeX - anodeX - 60);
                    ion.y = electrodeY + 20 + Math.random() * 70;
                }
            }
            drawDemoWithHighlight();
        }
        
        function animateDemo() {
            updateDemoAnimation();
            demoAnimId = requestAnimationFrame(animateDemo);
        }
        
        // 重置动画状态
        function resetDemoAnimation() {
            initDemoParticles();
            drawDemoWithHighlight();
        }
        
        // 处理分步讲解
        const stepTexts = [
            "步骤1: 负极(Zn)失去电子，发生氧化反应：Zn → Zn²⁺ + 2e⁻ (电子流出) ➜ 高亮负极区",
            "步骤2: 电子沿导线流向正极，产生电流，灯泡发光 ➜ 高亮导线/电子路径",
            "步骤3: 溶液中阳离子(H⁺或阳离子)向正极移动，获得电子被还原 ➜ 高亮溶液区",
            "步骤4: 完整闭合回路，离子迁移维持电荷平衡，持续产生电能 ➜ 全局观察"
        ];
        const stepHighlights = ["anode", "wire", "solution", null];
        function setDemoStep(step) {
            demoStep = Math.min(3, Math.max(0, step));
            document.getElementById('stepDetail').innerHTML = stepTexts[demoStep];
            demoHighlight = stepHighlights[demoStep];
            // 分步讲解时自动暂停
            if(demoPlaying) {
                demoPlaying = false;
                document.getElementById('playPauseDemoBtn').innerHTML = '▶️ 播放';
            }
            drawDemoWithHighlight();
        }
        
        // 重新加载演示配置 (案例/条件改变时)
        function reloadDemoConfig() {
            updateDemoParamsByCondition();
            resetDemoAnimation();
            setDemoStep(0);
            // 如果暂停状态更新UI
            if(!demoPlaying) drawDemoWithHighlight();
        }
        
        // 事件绑定
        document.getElementById('caseSelect').addEventListener('change', (e)=>{
            demoType = e.target.value;
            let extra = document.getElementById('extraOption');
            if(demoType === 'fruit') {
                // 水果电池电解质固定为柠檬汁
            }
            reloadDemoConfig();
        });
        document.getElementById('conditionSelect').addEventListener('change', (e)=>{
            demoCondition = e.target.value;
            reloadDemoConfig();
        });
        document.getElementById('playPauseDemoBtn').addEventListener('click',()=>{
            demoPlaying = !demoPlaying;
            document.getElementById('playPauseDemoBtn').innerHTML = demoPlaying ? '⏸️ 暂停' : '▶️ 播放';
            if(demoPlaying) drawDemoWithHighlight();
        });
        document.getElementById('resetAnimDemoBtn').addEventListener('click',()=>{
            resetDemoAnimation();
            if(!demoPlaying) drawDemoWithHighlight();
        });
        document.getElementById('stepPrevBtn').addEventListener('click',()=>{
            setDemoStep(demoStep-1);
        });
        document.getElementById('stepNextBtn').addEventListener('click',()=>{
            setDemoStep(demoStep+1);
        });
        
        // ----------------------------- 组装模块 -----------------------------
        const assemblyCanvas = document.getElementById('assemblyCanvas');
        const ctxAsm = assemblyCanvas.getContext('2d');
        assemblyCanvas.width = 700; assemblyCanvas.height = 380;
        let asmPlaying = true;
        let asmElectrons = [];
        let asmIons = [];
        let asmVoltage = 0;
        let asmValid = false;
        let asmParams = { anode:"Zn", cathode:"Cu", electrolyte:"H2SO4" };
        let asmAnimId = null;
        
        function initAssemblyParticles() {
            asmElectrons = [];
            for(let i=0;i<6;i++) asmElectrons.push({ progress: Math.random() });
            asmIons = [];
            for(let i=0;i<12;i++) {
                asmIons.push({
                    type: Math.random()>0.5 ? 'cation' : 'anion',
                    x: anodeX + 30 + Math.random() * (cathodeX - anodeX - 60),
                    y: electrodeY + 30 + Math.random() * 80,
                    vx:0, vy:0
                });
            }
        }
        
        function calculateAssemblyVoltage() {
            const {anode, cathode, electrolyte} = asmParams;
            let activity = 0;
            if(electrolyte === "H2SO4" || electrolyte === "lemon") activity = 1;
            else activity = 0.3;
            let metalDiff = 0;
            const metalOrder = {"Mg":1.6, "Al":1.3, "Zn":1.0, "Cu":0.2, "C":0.1, "Ag":0.3};
            let anodeAct = metalOrder[anode] || 0.8;
            let cathodeAct = metalOrder[cathode] || 0.2;
            if(anodeAct > cathodeAct && activity>0.2) {
                let volt = (anodeAct - cathodeAct) * 0.9 * activity;
                volt = Math.min(1.8, Math.max(0.2, volt));
                return {valid:true, voltage:Math.round(volt*100)/100};
            } else {
                return {valid:false, voltage:0};
            }
        }
        
        function drawAssemblyWithParticles() {
            const {anode,cathode,electrolyte} = asmParams;
            let elecName = electrolyte==="H2SO4"?"稀H₂SO₄":(electrolyte==="lemon"?"柠檬汁":"食盐水");
            drawBattery(ctxAsm, canvasW, canvasH, anode, cathode, elecName, asmVoltage, null);
            drawParticles(ctxAsm, asmElectrons, asmIons, anodeX, cathodeX, electrodeY);
        }
        
        function updateAssemblyAnimation() {
            if(!asmPlaying || !asmValid) return;
            let speed = 0.008 * (asmVoltage/1.1);
            for(let e of asmElectrons) {
                e.progress += speed;
                if(e.progress>=1) e.progress=0;
            }
            for(let ion of asmIons) {
                if(ion.type === 'cation') {
                    let dx = (cathodeX - 10) - ion.x, dy = (electrodeY) - ion.y;
                    let len = Math.hypot(dx,dy);
                    if(len>3) { ion.x += dx/len * 1.2; ion.y += dy/len * 0.8; }
                } else {
                    let dx = (anodeX + 10) - ion.x, dy = (electrodeY) - ion.y;
                    let len = Math.hypot(dx,dy);
                    if(len>3) { ion.x += dx/len * 1.0; ion.y += dy/len * 0.6; }
                }
                if(ion.x<anodeX-40 || ion.x>cathodeX+40 || ion.y<electrodeY-60 || ion.y>electrodeY+100) {
                    ion.x = anodeX + 30 + Math.random() * (cathodeX - anodeX - 60);
                    ion.y = electrodeY + 20 + Math.random() * 70;
                }
            }
            drawAssemblyWithParticles();
        }
        
        function asmAnimationLoop() {
            updateAssemblyAnimation();
            asmAnimId = requestAnimationFrame(asmAnimationLoop);
        }
        
        function assembleBattery() {
            const anode = document.getElementById('anodeSelect').value;
            const cathode = document.getElementById('cathodeSelect').value;
            const electrolyte = document.getElementById('electrolyteSelect').value;
            asmParams = {anode, cathode, electrolyte};
            const result = calculateAssemblyVoltage();
            asmValid = result.valid;
            asmVoltage = result.voltage;
            document.getElementById('assemblyVoltage').innerHTML = `电压: ${asmValid ? asmVoltage+" V" : "无效组合 ❌ 无法形成原电池"}`;
            let feedbackMsg = asmValid ? `✅ 成功组装！ ${anode} 更活泼，电子流出，形成电流，电压 ${asmVoltage} V` : `❌ 无法形成原电池：负极活泼性需大于正极且电解质需提供离子迁移。尝试镁/铜+酸性液。`;
            document.getElementById('assemblyFeedback').innerHTML = `🔍 ${feedbackMsg}`;
            initAssemblyParticles();
            if(!asmPlaying) {
                drawAssemblyWithParticles();
            }
        }
        
        document.getElementById('assembleBtn').addEventListener('click',()=>{
            assembleBattery();
        });
        document.getElementById('pauseAssemblyBtn').addEventListener('click',()=>{
            asmPlaying = !asmPlaying;
            document.getElementById('pauseAssemblyBtn').innerHTML = asmPlaying ? "⏸️ 暂停" : "▶️ 播放";
            if(asmPlaying) drawAssemblyWithParticles();
        });
        
        // 初始化所有
        function init() {
            initDemoParticles();
            updateDemoParamsByCondition();
            setDemoStep(0);
            animateDemo();
            assembleBattery(); // 默认组装一个有效电池
            asmAnimationLoop();
        }
        init();
    })();
</script>
</body>
</html>
