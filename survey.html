<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>原电池课堂检测问卷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #0f172a;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .back-button {
            margin-bottom: 20px;
        }
        .back-button button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .back-button button:hover {
            background: #4338ca;
        }
        .card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
            overflow: hidden;
            border: 1px solid rgba(226, 232, 240, 0.9);
        }
        .card-header {
            padding: 24px 28px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
        }
        .card-header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .card-header p {
            opacity: 0.9;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .card-body {
            padding: 24px 28px 28px;
        }
        .iframe-wrap {
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
            min-height: 640px;
            background: #ffffff;
        }
        .iframe-wrap iframe {
            width: 100%;
            height: 80vh;
            border: none;
            min-height: 640px;
        }
        .note {
            margin-top: 18px;
            font-size: 0.92rem;
            color: #475569;
            background: #f8fafc;
            padding: 16px;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
        }
        .open-link {
            display: inline-block;
            margin-top: 12px;
            background: #4f46e5;
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="back-button">
            <button onclick="window.location.href='index.html'">← 返回主界面</button>
        </div>
        <div class="card">
            <div class="card-header">
                <h1>化学“原电池”课堂检测问卷</h1>
            </div>
            <div class="card-body">
                <div class="iframe-wrap">
                    <iframe src="https://v.wjx.cn/vm/mibRXVf.aspx" title="问卷调查"></iframe>
                </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
